spring:
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:testDb}"
    username: "${DB_USER:testUser}"
    password: "${DB_PASSWORD:abcd@1234}"
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      connection-test-query: SELECT 1
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: SpringBootHikariCP
      max-lifetime: 60000
      connection-timeout: 30000

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.tramed.backend.infrastructure.mybatis.entity
  type-handlers-package: com.tramed.backend.infrastructure.mybatis.typehandler