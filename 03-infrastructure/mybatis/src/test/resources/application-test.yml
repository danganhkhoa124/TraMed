spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tramed
    username: postgres
    password: tramed@2025
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      connection-test-query: SELECT 1
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: SpringBootHikariCP
      max-lifetime: 60000
      connection-timeout: 30000

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:com/tramed/backend/infrastructure/mybatis/mapper/*.xml
  type-aliases-package: com.tramed.backend.infrastructure.mybatis.entity
#  type-handlers-package: com.tramed.backend.infrastructure.mybatis.typehandler