plugins {
    id 'java'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

group = 'com.tramed.backend'
version = '0.0.1-SNAPSHOT'

dependencies {
    implementation project(':00-tramed-core:base')
    implementation project(':00-tramed-core:utils')
    implementation project(':02-tramed-application-core:system-core')
    implementation 'org.springframework.boot:spring-boot-starter-aop'
}

bootJar {
    enabled = true
    manifest {
        attributes(
                'Start-Class': 'com.tramed.backend.presentation.webapi.WebApiApplication'
        )
    }
}