plugins {
    id 'java'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

group = 'com.tramed.backend'
version = '0.0.1-SNAPSHOT'

sourceSets {
    integrationTest {
        java.srcDir file('src/integrationTest/java')
        resources.srcDir file('src/integrationTest/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {
    implementation project(':00-tramed-core:base')
    implementation project(':00-tramed-core:utils')
    implementation project(':02-tramed-application-core:system-core')
    implementation 'org.springframework.boot:spring-boot-starter-aop'
}

tasks.register('integrationTest', Test) {
    description = 'Runs the integration tests.'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    shouldRunAfter('test')
}

bootJar {
    enabled = true
    manifest {
        attributes(
                'Start-Class': 'com.tramed.backend.presentation.webapi.WebApiApplication'
        )
    }
}